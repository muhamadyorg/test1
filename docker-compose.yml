services:
  hikvision-listener:
    build: .
    container_name: hikvision-listener
    restart: unless-stopped
    ports:
      - "4637:4637"
    environment:
      - NODE_ENV=production
      - PORT=4637
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4637/api/events"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
